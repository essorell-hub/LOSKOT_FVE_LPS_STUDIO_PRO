# LOSKOT FVE & LPS STUDIO PRO - bezpečný Aider režim přes Gemini

model: gemini

git: true
auto-commits: true
dirty-commits: false
attribute-author: true
attribute-committer: true
attribute-co-authored-by: true

show-diffs: true
auto-lint: false
auto-test: false
check-update: false

map-tokens: 4096
map-refresh: auto

pretty: true
stream: true
dark-mode: true
chat-language: cs
commit-language: cs

read:
  - PROJECT_STATE_UNIFIED.md
  - CHANGELOG.md
